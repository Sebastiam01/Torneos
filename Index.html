<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa League LK | Mobile Legends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .bracket-card { background: #1e293b; border-left: 4px solid #3b82f6; }
        .eliminated { text-decoration: line-through; opacity: 0.5; border-left-color: #ef4444 !important; }
        .winner { border-left-color: #22c55e !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="text-center mb-12">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">
            COPA LEAGUE LK
        </h1>
        <p class="text-gray-400 mt-2">Torneo Relámpago de Mobile Legends</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <section class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl h-fit shadow-xl">
            <h2 class="text-2xl font-bold mb-4 flex items-center">📝 Inscripción</h2>
            <form id="regForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400">Nombre del Equipo</label>
                    <input type="text" id="teamName" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400">ID del Capitán (WhatsApp/Discord)</label>
                    <input type="text" id="captain" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">Inscribir Equipo</button>
            </form>

            <div class="mt-8">
                <h3 class="font-bold mb-2 text-gray-300">Equipos Registrados:</h3>
                <ul id="teamList" class="text-sm space-y-2 text-gray-400">
                    </ul>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold italic">⚔️ Brackets de Combate</h2>
                <button onclick="toggleAdmin()" id="adminBtn" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600 transition">Modo Admin: OFF</button>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-8">
                    <h3 class="text-center text-blue-400 font-bold uppercase tracking-widest text-xs">Semifinales</h3>
                    
                    <div class="space-y-2">
                        <div id="m1-t1" onclick="manageMatch('m1-t1', 'm1-t2', 'fin-1')" class="bracket-card p-4 rounded-lg cursor-pointer transition">Equipo A</div>
                        <div class="text-center text-xs text-gray-600 italic">VS</div>
                        <div id="m1-t2" onclick="manageMatch('m1-t2', 'm1-t1', 'fin-1')" class="bracket-card p-4 rounded-lg cursor-pointer transition">Equipo B</div>
                    </div>

                    <div class="space-y-2">
                        <div id="m2-t1" onclick="manageMatch('m2-t1', 'm2-t2', 'fin-2')" class="bracket-card p-4 rounded-lg cursor-pointer transition">Equipo C</div>
                        <div class="text-center text-xs text-gray-600 italic">VS</div>
                        <div id="m2-t2" onclick="manageMatch('m2-t2', 'm2-t1', 'fin-2')" class="bracket-card p-4 rounded-lg cursor-pointer transition">Equipo D</div>
                    </div>
                </div>

                <div class="flex flex-col justify-center space-y-8">
                    <h3 class="text-center text-purple-400 font-bold uppercase tracking-widest text-xs">Gran Final</h3>
                    <div class="space-y-2">
                        <div id="fin-1" class="bracket-card p-4 rounded-lg border-purple-500">?</div>
                        <div class="text-center text-xs text-gray-600 italic">VS</div>
                        <div id="fin-2" class="bracket-card p-4 rounded-lg border-purple-500">?</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let adminMode = false;
        let teams = JSON.parse(localStorage.getItem('copaLK_teams')) || [];

        function toggleAdmin() {
            adminMode = !adminMode;
            document.getElementById('adminBtn').innerText = `Modo Admin: ${adminMode ? 'ON' : 'OFF'}`;
            document.getElementById('adminBtn').classList.toggle('bg-green-600');
        }

        // Registro de equipos
        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('teamName').value;
            teams.push(name);
            localStorage.setItem('copaLK_teams', JSON.stringify(teams));
            renderTeams();
            e.target.reset();
        };

        function renderTeams() {
            const list = document.getElementById('teamList');
            list.innerHTML = teams.map(t => `<li>• ${t}</li>`).join('');
        }

        // Lógica de avance de equipos
        function manageMatch(winnerId, loserId, nextStepId) {
            if (!adminMode) return;

            const winnerElem = document.getElementById(winnerId);
            const loserElem = document.getElementById(loserId);
            const nextElem = document.getElementById(nextStepId);

            // Tachar al que perdió
            loserElem.classList.add('eliminated');
            loserElem.classList.remove('winner');
            
            // Resaltar al que ganó
            winnerElem.classList.add('winner');
            winnerElem.classList.remove('eliminated');

            // Avanzar al equipo al siguiente cuadro
            if (nextElem) {
                nextElem.innerText = winnerElem.innerText;
            }
        }

        renderTeams();
    </script>
</body>
</html>
