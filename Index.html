<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa League LK | MLBB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .match-card { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; width: 180px; transition: 0.3s; }
        .eliminated { text-decoration: line-through; opacity: 0.4; filter: grayscale(1); border-color: #ef4444; }
        .winner { border-color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); color: #4ade80; }
        .bracket-line { height: 2px; background: #334155; flex-grow: 1; }
    </style>
</head>
<body class="p-5">

    <header class="text-center py-10">
        <h1 class="text-4xl font-black tracking-tighter text-blue-500 italic">COPA LEAGUE LK</h1>
        <p class="text-gray-500 uppercase text-xs tracking-widest">Torneo de Mobile Legends</p>
        <div class="mt-4">
            <button onclick="toggleAdmin()" id="btnAdmin" class="bg-slate-800 text-[10px] px-4 py-2 rounded-full border border-slate-700">MODO ADMIN: OFF</button>
        </div>
    </header>

    <main class="flex flex-row justify-center items-center gap-4 overflow-x-auto pb-20">
        
        <div class="flex flex-col gap-10">
            <h2 class="text-center text-[10px] text-gray-600 font-bold">CUARTOS</h2>
            <div class="space-y-1">
                <div id="c1-1" onclick="win('c1-1', 'c1-2', 's1-1')" class="match-card cursor-pointer">Equipo 1</div>
                <div id="c1-2" onclick="win('c1-2', 'c1-1', 's1-1')" class="match-card cursor-pointer">Equipo 2</div>
            </div>
            <div class="space-y-1">
                <div id="c2-1" onclick="win('c2-1', 'c2-2', 's1-2')" class="match-card cursor-pointer">Equipo 3</div>
                <div id="c2-2" onclick="win('c2-2', 'c2-1', 's1-2')" class="match-card cursor-pointer">Equipo 4</div>
            </div>
        </div>

        <div class="bracket-line w-10"></div>

        <div class="flex flex-col gap-32">
            <h2 class="text-center text-[10px] text-blue-900 font-bold">SEMIS</h2>
            <div class="space-y-1">
                <div id="s1-1" onclick="win('s1-1', 's1-2', 'f-1')" class="match-card cursor-pointer text-gray-500 text-sm italic font-light">Ganador P1</div>
                <div id="s1-2" onclick="win('s1-2', 's1-1', 'f-1')" class="match-card cursor-pointer text-gray-500 text-sm italic font-light">Ganador P2</div>
            </div>
        </div>

        <div class="bracket-line w-10"></div>

        <div class="flex flex-col">
            <h2 class="text-center text-[10px] text-yellow-600 font-bold">FINAL</h2>
            <div class="space-y-1">
                <div id="f-1" onclick="win('f-1', 'f-2', 'campeon')" class="match-card cursor-pointer text-gray-500 text-sm h-12 flex items-center">?</div>
                <div id="f-2" onclick="win('f-2', 'f-1', 'campeon')" class="match-card cursor-pointer text-gray-500 text-sm h-12 flex items-center">?</div>
            </div>
        </div>

        <div class="ml-10 text-center">
            <div class="text-5xl mb-2">🏆</div>
            <div id="campeon" class="text-xl font-bold text-yellow-500 uppercase tracking-tighter">Esperando...</div>
        </div>

    </main>

    <script>
        let admin = false;

        function toggleAdmin() {
            admin = !admin;
            const btn = document.getElementById('btnAdmin');
            btn.innerText = admin ? "MODO ADMIN: ON" : "MODO ADMIN: OFF";
            btn.className = admin ? "bg-green-600 text-[10px] px-4 py-2 rounded-full border border-green-400" : "bg-slate-800 text-[10px] px-4 py-2 rounded-full border border-slate-700";
        }

        function win(winnerId, loserId, nextId) {
            if (!admin) return;

            const w = document.getElementById(winnerId);
            const l = document.getElementById(loserId);
            const next = document.getElementById(nextId);

            // Efectos visuales
            w.classList.add('winner');
            w.classList.remove('eliminated');
            l.classList.add('eliminated');
            l.classList.remove('winner');

            // Pasar nombre
            if (nextId === 'campeon') {
                next.innerText = "¡" + w.innerText + "!";
            } else {
                next.innerText = w.innerText;
                next.classList.remove('text-gray-500', 'italic', 'font-light');
                next.classList.add('text-white', 'font-bold');
            }
        }
    </script>
</body>
</html>
