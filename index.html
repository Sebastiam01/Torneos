<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo LK League | MLBB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { background-color: #020617; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; }
        .font-title { font-family: 'Orbitron', sans-serif; }
        
        /* Capas de prioridad para que nada bloquee los clics */
        #main-nav { z-index: 9999; position: sticky; top: 0; }
        .page { position: relative; z-index: 10; min-height: 80vh; padding-top: 20px; }
        .hidden { display: none !important; }

        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .form-card { background: #0a0a0c; border: 1px solid #2d1b4d; border-radius: 12px; padding: 2rem; width: 100%; max-width: 600px; margin: auto; }
        .input-field { background: #121214; border: 1px solid #2d2d30; color: white; padding: 0.75rem 1rem; border-radius: 6px; width: 100%; outline: none; margin-bottom: 1rem; }
        
        /* Botones clickeables */
        button, a, .clickable { cursor: pointer !important; pointer-events: auto !important; }
        
        /* Brackets */
        .bracket-node { background: #1e293b; border-left: 4px solid #3b82f6; padding: 15px; border-radius: 8px; min-width: 180px; }
        .winner { border-left-color: #22c55e; color: #4ade80; }
        .eliminated { opacity: 0.4; text-decoration: line-through; border-left-color: #ef4444; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav id="main-nav" class="flex justify-between items-center px-6 py-4 glass text-white">
        <div class="text-xl font-bold font-title text-blue-500 cursor-pointer" onclick="showPage('home')">LK LEAGUE</div>
        <div class="flex gap-4 uppercase text-[10px] font-bold">
            <button onclick="showPage('home')" class="hover:text-blue-400 p-2">Home</button>
            <button onclick="showPage('inscripcion')" class="hover:text-blue-400 p-2">Inscripción</button>
            <button onclick="showPage('bracket')" class="hover:text-blue-400 p-2">Brackets</button>
            <button onclick="showPage('login')" class="bg-slate-800 px-2 py-1 rounded border border-white/20">Admin</button>
        </div>
    </nav>

    <main class="relative">
        
        <div id="page-home" class="page flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-5xl md:text-7xl font-black font-title mb-6 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600 uppercase pt-20">Torneo LK League</h1>
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button onclick="showPage('inscripcion')" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold uppercase transition shadow-lg">Inscribir Equipo</button>
                <button onclick="showPage('bracket')" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-lg font-bold uppercase transition">Ver Brackets</button>
            </div>
        </div>

        <div id="page-inscripcion" class="page hidden px-4">
            <div class="form-card text-left">
                <h2 class="text-2xl font-bold mb-6 font-title text-center text-purple-400 uppercase">Alista tu Escuadra</h2>
                <form id="formRegistro">
                    <label class="text-xs text-gray-500 uppercase font-bold">Nombre del Equipo</label>
                    <input type="text" id="teamName" placeholder="Ej: Kings Of MLBB" class="input-field" required>
                    
                    <label class="text-xs text-gray-500 uppercase font-bold">Nickname Capitán</label>
                    <input type="text" id="capName" placeholder="Nickname" class="input-field" required>
                    
                    <label class="text-xs text-gray-500 uppercase font-bold">ID Game Capitán</label>
                    <input type="text" id="capID" placeholder="ID" class="input-field" required>

                    <label class="text-xs text-gray-500 uppercase font-bold">WhatsApp Capitán</label>
                    <input type="text" id="capTel" placeholder="Número" class="input-field" required>

                    <button type="submit" class="w-full bg-purple-600 py-4 rounded-xl font-bold uppercase mt-4 hover:bg-purple-700 transition">Confirmar Equipo</button>
                </form>
            </div>
        </div>

        <div id="page-bracket" class="page hidden px-4 text-center">
            <h2 class="text-3xl font-title font-bold mb-10 text-blue-400">BRACKETS OFICIALES</h2>
            <div id="adminControls" class="hidden mb-6 bg-yellow-900/30 p-4 border border-yellow-600 rounded max-w-md mx-auto">
                <p class="text-yellow-500 font-bold mb-2">PANEL ADMIN ACTIVADO</p>
                <button onclick="location.reload()" class="text-xs bg-yellow-600 px-2 py-1 rounded text-black font-bold">Cerrar Sesión</button>
            </div>
            
            <div class="flex flex-wrap justify-center gap-8">
                <div class="space-y-4">
                    <div id="m1-1" onclick="handleWin('m1-1','m1-2','f-1')" class="bracket-node cursor-pointer">Equipo 1</div>
                    <div id="m1-2" onclick="handleWin('m1-2','m1-1','f-1')" class="bracket-node cursor-pointer">Equipo 2</div>
                </div>
            </div>

            <div id="teamAdminList" class="hidden mt-10 max-w-md mx-auto text-left">
                <h3 class="text-gray-500 text-xs mb-4 uppercase border-b border-gray-800 pb-2">Equipos Inscritos:</h3>
                <div id="listContent" class="space-y-2"></div>
            </div>
        </div>

        <div id="page-login" class="page hidden flex items-center justify-center">
            <div class="form-card max-w-xs text-center">
                <h2 class="text-xl font-bold mb-6 font-title uppercase">Admin Access</h2>
                <input type="text" id="userAdmin" placeholder="Usuario" class="input-field">
                <input type="password" id="passAdmin" placeholder="Contraseña" class="input-field">
                <button onclick="login()" class="w-full bg-blue-600 py-3 rounded font-bold uppercase hover:bg-blue-500 transition">Entrar</button>
            </div>
        </div>

    </main>

    <footer class="mt-20 border-t border-gray-900 p-10 text-center text-gray-600 text-xs uppercase tracking-widest">
        © 2026 Copa League LK | Mobile Legends Torneo
    </footer>

    <script>
        // 1. CONFIGURACIÓN SUPABASE (He puesto tu URL de nuevo)
        const SUPABASE_URL = 'https://vzewsgkozmnlvqamhswo.supabase.co';
        // RECUERDA CAMBIAR ESTO POR TU ANON KEY
        const SUPABASE_KEY = 'sb_secret_hFn6tVvxpkLciZm5EHwCig_lIuxvQ7k'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        // 2. FUNCIÓN DE NAVEGACIÓN (Aislada para que no falle)
        function showPage(id) {
            console.log("Cambiando a:", id);
            // Ocultar todas
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.add('hidden'));
            
            // Mostrar destino
            const target = document.getElementById('page-' + id);
            if(target) {
                target.classList.remove('hidden');
            }
            
            if(id === 'bracket') renderAdminList();
            window.scrollTo(0,0);
        }

        // 3. REGISTRO
        document.getElementById('formRegistro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Guardando...";
            btn.disabled = true;

            const equipo = {
                nombre_equipo: document.getElementById('teamName').value,
                capitan: document.getElementById('capName').value,
                tel_capitan: document.getElementById('capTel').value,
                ids_jugadores: JSON.stringify([document.getElementById('capID').value])
            };

            const { error } = await _supabase.from('inscritos').insert([equipo]);

            if(error) {
                alert("Error al conectar con Supabase. Revisa tu Key.");
                btn.innerText = "Confirmar Equipo";
                btn.disabled = false;
            } else {
                alert("✅ EQUIPO REGISTRADO");
                location.reload();
            }
        };

        // 4. ADMIN
        function login() {
            const u = document.getElementById('userAdmin').value;
            const p = document.getElementById('passAdmin').value;
            if(u === 'sebastian2026' && p === 'admin123') {
                isAdmin = true;
                document.getElementById('adminControls').classList.remove('hidden');
                document.getElementById('teamAdminList').classList.remove('hidden');
                showPage('bracket');
            } else { alert("Datos incorrectos"); }
        }

        async function renderAdminList() {
            const { data } = await _supabase.from('inscritos').select('*');
            const cont = document.getElementById('listContent');
            if(data && cont) {
                cont.innerHTML = data.map(eq => `
                    <div class="flex justify-between items-center bg-gray-900 p-3 rounded border border-gray-800">
                        <span class="text-sm font-bold text-blue-400 uppercase">${eq.nombre_equipo}</span>
                        <button onclick="eliminar('${eq.id}')" class="text-red-500 font-bold px-2">X</button>
                    </div>
                `).join('');
            }
        }

        async function eliminar(id) {
            if(!isAdmin) return;
            await _supabase.from('inscritos').delete().eq('id', id);
            renderAdminList();
        }

        function handleWin(wId, lId, nId) {
            if(!isAdmin) return;
            document.getElementById(wId).classList.add('winner');
            document.getElementById(lId).classList.add('eliminated');
        }

        // Ejecutar al cargar para asegurar que el Home se vea
        window.onload = () => showPage('home');
    </script>
</body>
</html>
