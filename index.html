<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo LK League | MLBB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { background-color: #020617; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; }
        .font-title { font-family: 'Orbitron', sans-serif; }
        
        /* Capas de profundidad (Z-Index) */
        nav { z-index: 100; } /* El menú siempre arriba de todo */
        .page { z-index: 10; min-height: calc(100vh - 80px); } 
        footer { z-index: 50; position: relative; }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Estilos de botones y tarjetas */
        .bracket-node { min-width: 150px; border-left: 4px solid #3b82f6; transition: 0.3s; background: rgba(30, 41, 59, 0.5); }
        .eliminated { opacity: 0.4; text-decoration: line-through; border-left-color: #ef4444; }
        .winner { border-left-color: #22c55e; color: #4ade80; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .hidden { display: none !important; }

        .form-card { background: #0a0a0c; border: 1px solid #2d1b4d; border-radius: 12px; padding: 2rem; }
        .input-field { background: #121214; border: 1px solid #2d2d30; color: white; padding: 0.75rem 1rem; border-radius: 6px; width: 100%; outline: none; }
        .input-field:focus { border-color: #a855f7; }
        
        /* Evita que los clics se bloqueen */
        button, a { cursor: pointer !important; pointer-events: auto !important; position: relative; z-index: 110; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="flex justify-between items-center px-8 py-4 glass sticky top-0">
        <div class="text-2xl font-bold font-title text-blue-500 tracking-tighter cursor-pointer" onclick="showPage('home')">LK LEAGUE</div>
        <div class="flex gap-6 uppercase text-sm font-bold">
            <button onclick="showPage('home')" class="hover:text-blue-400 transition">Home</button>
            <button onclick="showPage('inscripcion')" class="hover:text-blue-400 transition">Inscripción</button>
            <button onclick="showPage('bracket')" class="hover:text-blue-400 transition">Brackets</button>
            <button onclick="showPage('login')" class="text-xs bg-slate-800 px-3 py-1 rounded border border-slate-600 hover:bg-slate-700">Login Admin</button>
        </div>
    </nav>

    <div id="page-home" class="page flex flex-col items-center justify-center text-center p-4">
        <h1 class="text-5xl md:text-7xl font-black font-title mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600 uppercase">Torneo LK League</h1>
        <div class="flex flex-wrap justify-center gap-4 mt-8">
            <button onclick="showPage('inscripcion')" class="px-8 py-4 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold uppercase shadow-lg transition">Inscribir</button>
            <button onclick="showPage('bracket')" class="px-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-lg font-bold uppercase transition text-sm">Ver Equipos</button>
            <button onclick="showPage('bracket')" class="px-8 py-4 border border-yellow-600 text-yellow-500 hover:bg-yellow-600/10 rounded-lg font-bold uppercase transition text-sm">Ver Resultados</button>
        </div>
    </div>

    <div id="page-inscripcion" class="page hidden p-8 max-w-4xl mx-auto">
        <div class="form-card">
            <h2 class="text-3xl font-bold mb-2 uppercase font-title text-center">Inscripción</h2>
            <form id="formRegistro" class="space-y-6">
                <input type="text" id="teamName" placeholder="Nombre del Equipo" class="input-field" required>
                <input type="text" id="capName" placeholder="Nickname del Capitán" class="input-field" required>
                <input type="text" id="capTel" placeholder="Teléfono" class="input-field" required>
                <input type="text" id="capID" placeholder="ID Game Capitán" class="input-field" required>
                
                <div id="additionalPlayers" class="space-y-4"></div>
                <button type="button" onclick="addPlayerField()" id="btnAddPlayer" class="w-full border border-dashed border-purple-500 py-3 text-purple-400 rounded-lg">+ Agregar Jugador</button>
                <button type="submit" class="w-full bg-purple-600 py-4 rounded-xl font-bold uppercase">Confirmar Equipo</button>
            </form>
        </div>
    </div>

    <div id="page-bracket" class="page hidden p-8 text-center">
        <h2 class="text-4xl font-title font-bold mb-10 uppercase">Brackets</h2>
        <div id="adminControls" class="hidden mb-6 bg-yellow-600/20 p-4 border border-yellow-600 rounded">
            <p class="text-yellow-500 font-bold uppercase">Modo Admin Activo</p>
            <button onclick="location.reload()" class="text-xs underline">Cerrar Sesión</button>
        </div>
        <div class="flex justify-center items-center gap-8 overflow-x-auto pb-10">
            <div class="bracket-node p-4 rounded" id="m1-1" onclick="handleWin('m1-1','m1-2','f-1')">Equipo A</div>
             <span class="text-gray-600 italic">VS</span>
             <div class="bracket-node p-4 rounded" id="m1-2" onclick="handleWin('m1-2','m1-1','f-1')">Equipo B</div>
        </div>
        <div id="teamAdminList" class="hidden mt-10 max-w-2xl mx-auto text-left">
            <h3 class="text-gray-400 uppercase text-xs mb-4">Equipos en Nube:</h3>
            <div id="listContent" class="space-y-2"></div>
        </div>
    </div>

    <div id="page-login" class="page hidden flex items-center justify-center">
        <div class="glass p-8 rounded-xl w-80 text-center border border-white/10">
            <h2 class="text-xl font-bold mb-6 font-title">ADMIN LOGIN</h2>
            <input type="text" id="userAdmin" placeholder="Usuario" class="input-field mb-4">
            <input type="password" id="passAdmin" placeholder="Contraseña" class="input-field mb-6">
            <button onclick="login()" class="w-full bg-blue-600 py-2 rounded font-bold">ENTRAR</button>
        </div>
    </div>

    <footer class="border-t border-white/5 bg-[#01040a] px-10 py-12 w-full text-left">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <h2 class="text-xl font-bold font-title uppercase">Copa League <span class="text-purple-500">LK</span></h2>
                <p class="text-gray-500 text-sm mt-2">© 2026 Torneo Oficial</p>
            </div>
            <div class="flex gap-4">
                <div class="w-10 h-10 border border-gray-800 rounded flex items-center justify-center">IG</div>
                <div class="w-10 h-10 border border-gray-800 rounded flex items-center justify-center">FB</div>
            </div>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://vzewsgkozmnlvqamhswo.supabase.co';
        const SUPABASE_KEY = 'sb_secret_hFn6tVvxpkLciZm5EHwCig_lIuxvQ7k'; // Asegúrate que esta sea la ANON key
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        function showPage(id) {
            console.log("Cambiando a pagina:", id); // Para debug
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            const target = document.getElementById('page-' + id);
            if (target) {
                target.classList.remove('hidden');
            }
            if (id === 'bracket') renderAdminList();
            window.scrollTo(0,0);
        }

        // Lógica de Admin
        function login() {
            const u = document.getElementById('userAdmin').value;
            const p = document.getElementById('passAdmin').value;
            if(u === 'sebastian2026' && p === 'admin123') {
                isAdmin = true;
                document.getElementById('adminControls').classList.remove('hidden');
                document.getElementById('teamAdminList').classList.remove('hidden');
                showPage('bracket');
            } else { alert("Error de acceso"); }
        }

        async function renderAdminList() {
            const { data } = await supabase.from('inscritos').select('*');
            const cont = document.getElementById('listContent');
            if (data) {
                cont.innerHTML = data.map(eq => `
                    <div class="flex justify-between bg-slate-900/50 p-3 rounded border border-white/5">
                        <span>${eq.nombre_equipo}</span>
                        <button onclick="eliminar('${eq.id}')" class="text-red-500 font-bold">X</button>
                    </div>
                `).join('');
            }
        }

        async function eliminar(id) {
            if(!isAdmin) return;
            await supabase.from('inscritos').delete().eq('id', id);
            renderAdminList();
        }

        function handleWin(wId, lId, nId) {
            if(!isAdmin) return;
            document.getElementById(wId).classList.add('winner');
            document.getElementById(lId).classList.add('eliminated');
        }
    </script>
</body>
</html>
